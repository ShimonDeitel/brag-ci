name: Brag
options:
  bundleIdPrefix: com.shimondeitel.brag
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Brag:
    type: application
    platform: iOS
    sources:
      - path: Brag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.brag
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Brag/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BragTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BragTests
      - path: Brag.storekit
    dependencies:
      - target: Brag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.brag.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BragUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BragUITests
    dependencies:
      - target: Brag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.brag.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Brag:
    build:
      targets:
        Brag: all
        BragTests: [test]
        BragUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Brag.storekit
    test:
      config: Debug
      storeKitConfiguration: Brag.storekit
      targets:
        - BragTests
        - BragUITests
    archive:
      config: Release
